name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (electron-vite)
        run: npm run build

      - name: Package Windows installer
        run: npx electron-builder --win --x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Abapfy ${{ github.ref_name }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Abapfy ${{ github.ref_name }}

            ### Instalação
            1. Baixe o arquivo `Abapfy-Setup-*.exe`
            2. Execute o instalador
            3. Configure um provedor de IA em **Configurações → IA & APIs**
            4. Crie as tabelas no Supabase conforme o [README](https://github.com/${{ github.repository }}#-banco-de-dados-supabase)

            ### O que há de novo
            Veja o [CHANGELOG](https://github.com/${{ github.repository }}#-changelog) no README.
          files: |
            dist/Abapfy-Setup-*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
